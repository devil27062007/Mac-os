<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Mac OS</title>
    <link rel="stylesheet" href="https://unpkg.com/@sakun/system.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="index.css">
</head>

<body class="font-['Chicago'] text-black h-screen w-screen flex flex-col">
    <!-- animation made so whenj the page load it plays it -->
    <div class="loading-animation w-full w-full">
        <div class="mac-alone flex justify-center items-center w-full h-full">
            <img src="assets/icons/happy-mac-icon.svg" alt="Happy Mac" width="48" height="48">
        </div>
        <div class="welcome-animation flex justify-center items-center w-full h-full" style="display: none !important;">
            <img src="assets/loading/Untitled.png" alt="loading untittled"
                style="max-width: 80%; max-height: 80vh; object-fit: contain;">
        </div>
    </div>
    <div class="after-loading w-full flex-1 flex flex-col" style="display: none !important;">
        <!-- navbar -->
        <nav 
            class="bg-white w-screen h-10 px-5 flex justify-between items-center pl-5 pr-5 shadow-[0_2px_0_0_#000]">
            <ul role="menu-bar" class="flex items-center gap-4 text-lg! h-fit">
                <li>
                    <img src="assets/icons/apple-icon.svg" alt="Apple icon" width="16" height="16"
                        class="cursor-default">
                </li>
                <li role="menu-item" tabindex="0" aria-haspopup="true">
                    File
                    <ul role="menu">
                        <li role="menu-item"><button id="open">Open</button>
                        <li role="menu-item"><button id="new-file">New File</button></li>
                        <li role="menu-item"><button id="close-win">Close</button></li>
                        <li role="menu-item"><button id="close-all-win">Close All</button></li>
                        <li role="menu-item"><button id="print">Print</button></li>
                    </ul>
                </li>
                <li role="menu-Item" tabindex="0" aria-haspopup="true">
                    Edit
                    <ul role="menu">
                        <li role="menu-item"><a href="#menu">Action</a></li>
                    </ul>
                </li>
                <li role="menu-item" tabindex="0" aria-haspopup="true">
                    View
                    <ul role="menu">
                        <li role="menu-item"><a href="#menu">Action</a></li>
                    </ul>
                </li>
                <li role="meni-item" tabindex="0" aria-haspopup="true">
                    Special
                    <ul role="menu">
                        <li role="menu-item"><a href="#menu">Devil007</a></li>
                    </ul>
                </li>
            </ul>
            <ul role="menu-bar">
                <li id="clock" class="text-lg!"></li>
            </ul>
        </nav>
        <!-- homepage with icons -->
        <div class="home flex-1">
            <div id="trash-icon" class="homeIcons">
                <div class="imagecontent">
                    <img src="assets/icons/trash.svg" alt="trash" width="24" height="24" draggable="false">
                </div>
                <div>
                    <p id="label" class="text-sm! w-fit font-normal bg-white text-black">Trash</p>
                </div>
            </div>
            <div id="system-folder-icon" class="homeIcons">
                <div>
                    <img src="assets/icons/mac-system-icon.svg" draggable="false">
                </div>
                <div>
                    <p id="label" class="text-sm! w-fit font-normal bg-white text-black">System</p>
                </div>
            </div>
        </div>

        <!-- the modal for opening for the icons-->
        <div class="window w-64 h-48 z-10" id="system-folder" style="display: none !important;">
            <div class="title-bar">
                <button aria-label="Close" class="close"></button>
                <h1 class="title">System</h1>
                <button aria-label="Resize" class="resize"></button>
            </div>
            <div class="separator"></div>

            <div class="window-pane">
                woo i got stuff in me!
            </div>
        </div>
        <div class="window fixed w-128 h-48 z-10" id="open-folder" style="display: none !important;">
            <div class="title-bar">
                <button aria-label="Close" class="close"></button>
                <h1 class="title">Open</h1>
                <button aria-label="Resize" class="resize"></button>
            </div>
            <div class="seperator"></div>

            <div class="window-pane flex flex-row">
                <section class="flex flex-col gap-y-3 w-1/2 border-r-2 border-solid pr-2 border-black" style="justify-content: flex-start;">
                    <input id="open-input-field" aria-label="Example text box" type="text" placeholder="file name"/>
                    <button class="btn shrink-0 flex-grow-0 w-fit" id="open-open">Open</button>
                </section>
                <section class="flex flex-col gap-y-1 flex-1 overflow-y-auto idfile-list">
                </section>
            </div>
        </div>
        <div class="window fixed w-64 h-48 z-10 flex! flex-col! overflow-hidden!" id = "read-folder" 
        style="display: none !important;">
            <div class="title-bar">
                <button aria-label="Close" class="close"></button>
                <h1 class="title"></h1>
                <button aria-label="Resize" class="resize" ></button>
            </div>
            <div class="seperator"></div>
            
            <div class="window-pane flex-1 overflow-y-auto! min-h-0">
            </div>
    </div>
        <div class="window scale-down fixed w-64 h-fit p-1 z-10" style="display: none !important;" id="new-folder">
            <div class="title-bar">
                <button aria-label="Close" class="close"></button>
                <h1 class="title">New File</h1>
                <button aria-label="Resize" disabled class="hidden"></button>
            </div>
            <div class="seperator"></div>

            <div class="modeless-dialog">
                <section class="field-row" style="justify-content: flex-start;">
                    <label for="file-create" class="modeless-text">File-Name: </label>
                    <input id="file-create" type="text" class="flex-1" placeholder="">
                </section>
                <section class="field-row pt-5" style="justify-content: flex-end;">
                    <button class="btn" id="cancel">Cancel</button>
                    <button class="btn" id="create">Create</button>
                </section>
            </div>
        </div>
        <div class="alert-box h-fit! w-fit! fixed outer-border scale-down" style="display: none !important;">
            <div class="inner-border">
                <div class="alert-contents" style="padding-left: 30px; padding-right: 20px;">
                    <section class="field-row" style="justify-content: flex-start;">
                        <div class="square">
                            <img src="assets/icons/alert-face-exclam.svg" alt="!" width="32" height="32">
                        </div>
                        <p class="alert-text text-xl!" id="alert-text" style="padding-left: 10px;"></p>
                    </section>
                    <section class="field-row" style="justify-content: flex-end;">
                        <button class="btn" id="alert-okay">Ok</button>
                    </section>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
